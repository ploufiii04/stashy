name: Build Archive Only

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project stashy.xcodeproj -scheme stashy

      - name: Archive app without signing
        run: |
          xcodebuild \
            -project stashy.xcodeproj \
            -scheme stashy \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/stashy.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Upload xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: stashy-xcarchive
          path: build/stashy.xcarchive
